apiVersion: apps/v1
kind: Deployment
metadata:
  name: history-api
  labels:
    app: history-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: history-api
  template:
    metadata:
      labels:
        app: history-api
    spec:
      containers:
        - name: history-api
          image: trading-dashboard/history-api:latest
          ports:
            - containerPort: 3002
          env:
            - name: HISTORY_API_PORT
              value: "3002"
            - name: MARKET_DATA_WS
              value: "ws://market-data:3001"
            - name: AUTH_SERVICE_URL
              value: "http://auth:3004"
---
apiVersion: v1
kind: Service
metadata:
  name: history-api
spec:
  selector:
    app: history-api
  ports:
    - port: 3002
      targetPort: 3002
