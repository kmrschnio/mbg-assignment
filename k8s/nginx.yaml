apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
data:
  nginx.conf: |
    upstream market_data { server market-data:3001; }
    upstream history_api { server history-api:3002; }
    upstream alert_engine { server alert-engine:3003; }
    upstream auth_service { server auth:3004; }

    server {
        listen 80;

        location /ws {
            proxy_pass http://market_data;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }

        location /api/history { rewrite ^/api/(.*)$ /$1 break; proxy_pass http://history_api; }
        location /api/tickers { rewrite ^/api/(.*)$ /$1 break; proxy_pass http://history_api; }
        location /api/alerts  { rewrite ^/api/(.*)$ /$1 break; proxy_pass http://alert_engine; }
        location /api/auth    { rewrite ^/api/(.*)$ /$1 break; proxy_pass http://auth_service; }

        location / { proxy_pass http://frontend:5173; }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  labels:
    app: nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf
      volumes:
        - name: config
          configMap:
            name: nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: nginx
spec:
  type: LoadBalancer
  selector:
    app: nginx
  ports:
    - port: 80
      targetPort: 80
