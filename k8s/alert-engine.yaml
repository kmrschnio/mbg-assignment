apiVersion: apps/v1
kind: Deployment
metadata:
  name: alert-engine
  labels:
    app: alert-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alert-engine
  template:
    metadata:
      labels:
        app: alert-engine
    spec:
      containers:
        - name: alert-engine
          image: trading-dashboard/alert-engine:latest
          ports:
            - containerPort: 3003
          env:
            - name: ALERT_ENGINE_PORT
              value: "3003"
            - name: MARKET_DATA_WS
              value: "ws://market-data:3001"
---
apiVersion: v1
kind: Service
metadata:
  name: alert-engine
spec:
  selector:
    app: alert-engine
  ports:
    - port: 3003
      targetPort: 3003
