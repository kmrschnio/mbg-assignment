apiVersion: apps/v1
kind: Deployment
metadata:
  name: market-data
  labels:
    app: market-data
spec:
  replicas: 1
  selector:
    matchLabels:
      app: market-data
  template:
    metadata:
      labels:
        app: market-data
    spec:
      containers:
        - name: market-data
          image: trading-dashboard/market-data:latest
          ports:
            - containerPort: 3001
          env:
            - name: MARKET_DATA_PORT
              value: "3001"
---
apiVersion: v1
kind: Service
metadata:
  name: market-data
spec:
  selector:
    app: market-data
  ports:
    - port: 3001
      targetPort: 3001
