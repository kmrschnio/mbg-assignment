upstream market_data {
    server market-data:3001;
}

upstream history_api {
    server history-api:3002;
}

upstream alert_engine {
    server alert-engine:3003;
}

upstream auth_service {
    server auth:3004;
}

server {
    listen 80;

    # WebSocket — market data stream
    location /ws {
        proxy_pass http://market_data;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # WebSocket — alert engine push
    location /ws/alerts {
        proxy_pass http://alert_engine;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # REST — tickers and history
    location /api/history {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://history_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/tickers {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://history_api;
        proxy_set_header Host $host;
    }

    # REST — alerts
    location /api/alerts {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://alert_engine;
        proxy_set_header Host $host;
    }

    # REST — auth
    location /api/auth {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://auth_service;
        proxy_set_header Host $host;
    }

    # Frontend — static files
    location / {
        proxy_pass http://frontend:5173;
        proxy_set_header Host $host;
    }
}
